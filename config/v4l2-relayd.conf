# GC2607 virtual camera — v4l2-relayd configuration.
#
# This is the packaging-ready form of the relayd setup. When the IPU6 HAL is
# installed to /usr (the canonical, pkg-config-discoverable layout), copy this
# file to /etc/v4l2-relayd.d/gc2607.conf and enable the packaged service:
#
#     sudo install -m0644 config/v4l2-relayd.conf /etc/v4l2-relayd.d/gc2607.conf
#     sudo systemctl daemon-reload      # runs the v4l2-relayd generator
#     sudo systemctl enable --now v4l2-relayd.service
#
# The generator creates a v4l2-relayd@gc2607 instance that finds the loopback
# device by CARD_LABEL and runs relayd against it. relayd starts the real
# GC2607 source only while a consumer holds the loopback open
# (V4L2_EVENT_PRI_CLIENT_USAGE), and feeds SPLASHSRC otherwise.
#
# Keep the pipeline here in sync with scripts/run-virtual-camera-feeder.sh,
# which builds the equivalent invocation for the in-tree $HOME HAL build.

# Real GC2607 source. The packaged unit appends relayd's appsink, so this must
# end producing exactly FORMAT/WIDTH/HEIGHT/FRAMERATE below. ae-mode=manual
# locks exposure so the picture does not pump; drop the manual props (or set
# ae-mode=auto) to restore auto-exposure.
VIDEOSRC="icamerasrc device-name=gc2607-uf ae-mode=manual exposure-time=22000 gain=10 ! video/x-raw,format=NV12,width=1920,height=1080,framerate=30/1 ! videoflip method=rotate-180 ! videoconvert ! videoscale ! videorate ! video/x-raw,format=YUY2,width=1280,height=720,framerate=30/1"

# Idle image shown to consumers while the real camera is off. Keeps the node
# discoverable under exclusive_caps=1 without powering the sensor.
SPLASHSRC="videotestsrc is-live=true pattern=black"

# Output format the loopback advertises.
FORMAT=YUY2
WIDTH=1280
HEIGHT=720
FRAMERATE=30/1

# Must match the v4l2loopback card_label (see config/modprobe.d drop-in).
CARD_LABEL="GC2607 Virtual Camera"

# --- HAL prefix wiring (in-tree $HOME build only) -------------------------
# These point GStreamer at a non-/usr HAL prefix. A packaged /usr install drops
# them entirely: ld.so, pkg-config, and GStreamer all auto-discover /usr.
# Uncomment and adjust GC2607_PREFIX if you run the packaged service against a
# locally built HAL instead of a /usr package.
#LD_LIBRARY_PATH=/home/youruser/opt/gc2607-ipu6/lib:/home/youruser/opt/gc2607-ipu6/lib/libcamhal/plugins
#GST_PLUGIN_PATH=/home/youruser/opt/gc2607-ipu6/lib/gstreamer-1.0
#GST_REGISTRY=/home/youruser/opt/gc2607-ipu6/gstreamer-registry.bin
