# Options for the GC2607 virtual camera loopback device.
#
# v4l2-relayd loads v4l2loopback (via its own modules-load.d drop-in) and binds
# the relayd instance to the device whose label matches CARD_LABEL in
# /etc/v4l2-relayd.d/gc2607.conf. These options create that single labelled
# device. exclusive_caps=1 keeps the node visible to WebRTC pickers while idle.
#
# Keep in sync with config/v4l2-relayd.conf (CARD_LABEL) and
# scripts/virtual-camera.sh (ensure_loopback).
options v4l2loopback devices=1 video_nr=60 card_label="GC2607 Virtual Camera" exclusive_caps=1 max_buffers=2
