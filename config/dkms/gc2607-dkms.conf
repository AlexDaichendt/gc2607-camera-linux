# DKMS configuration for the GC2607 V4L2 sensor module.
#
# The upstream gc2607-v4l2-driver tree does not ship a dkms.conf, so this repo
# provides one. install-gc2607-dkms.sh prefers a dkms.conf from the driver tree
# if present and falls back to this file otherwise.
#
# PACKAGE_NAME/PACKAGE_VERSION must match install-gc2607-dkms.sh.
# AUTOINSTALL=yes so the sensor module is rebuilt automatically on kernel
# upgrades (out-of-tree modules are otherwise lost on every kernel bump).

PACKAGE_NAME="gc2607"
PACKAGE_VERSION="0.1.0"
AUTOINSTALL="yes"

BUILT_MODULE_NAME[0]="gc2607"
DEST_MODULE_LOCATION[0]="/updates/dkms"

# LLVM=1: the CachyOS/Arch kernel here is clang-built, so external modules must
# use the LLVM toolchain or the build fails with unknown-gcc-flag errors.
MAKE[0]="make LLVM=1 -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make LLVM=1 -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"
