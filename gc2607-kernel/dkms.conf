# DKMS configuration for the GC2607 V4L2 sensor module.
#
# This lives at the root of the driver source tree (the canonical location), so
# `dkms add` can stage the whole tree on its own. PACKAGE_VERSION is the single
# source of truth for the version; install-gc2607-dkms.sh reads it from here.
#
# AUTOINSTALL=yes so the sensor module is rebuilt automatically on kernel
# upgrades (out-of-tree modules are otherwise lost on every kernel bump).

PACKAGE_NAME="gc2607"
PACKAGE_VERSION="0.3.1"
AUTOINSTALL="yes"

BUILT_MODULE_NAME[0]="gc2607"
DEST_MODULE_LOCATION[0]="/updates/dkms"

# Match the toolchain the target kernel was built with: clang-built kernels
# (e.g. CachyOS/Arch) need LLVM=1 for external modules or the build fails on
# unknown gcc flags, while gcc-built kernels must NOT pass LLVM=1. dkms.conf is
# sourced as shell, so detect it from the kernel's own config and pass the flag
# only when needed. This makes the same config work on either toolchain.
_gc2607_llvm=""
if grep -hqs '^CONFIG_CC_IS_CLANG=y' \
       "${kernel_source_dir}/.config" \
       "${kernel_source_dir}/include/config/auto.conf"; then
    _gc2607_llvm="LLVM=1"
fi

MAKE[0]="make ${_gc2607_llvm} -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
