# DKMS configuration for the patched ipu-bridge module.
#
# The distro ipu-bridge.ko does not include the GC2607 sensor ACPI HID
# (GCTI2607). This DKMS package builds a replacement that adds it, and
# installs it to updates/dkms/ so depmod prefers it over the kernel copy.
#
# AUTOINSTALL=yes rebuilds automatically on kernel upgrades so the entry
# is not lost again after the next kernel bump.

PACKAGE_NAME="ipu-bridge-gc2607"
PACKAGE_VERSION="0.1.0"
AUTOINSTALL="yes"

BUILT_MODULE_NAME[0]="ipu-bridge"
DEST_MODULE_LOCATION[0]="/updates/dkms"

_ipu_bridge_llvm=""
if grep -hqs '^CONFIG_CC_IS_CLANG=y' \
       "${kernel_source_dir}/.config" \
       "${kernel_source_dir}/include/config/auto.conf"; then
    _ipu_bridge_llvm="LLVM=1"
fi

MAKE[0]="make ${_ipu_bridge_llvm} -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
